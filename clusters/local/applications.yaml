apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: picpay-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SEU-USUARIO/picpay-gitops.git'
    targetRevision: HEAD
    path: apps/picpay-api/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true