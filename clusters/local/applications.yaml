kubectl apply -f - <<EOF
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: picpay-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/medinasp/k8s-easy-picpay.git
    targetRevision: main
    path: apps/picpay-api/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
EOF